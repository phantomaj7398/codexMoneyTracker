<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Money Tracker share target for transaction screenshots.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Import Transaction</title>
</head>
<body>
  <div class="app-shell">
    <main class="stack">
      <section class="panel" aria-labelledby="shareHeading">
        <div class="panel-header">
          <div>
            <p class="panel-label">Share target</p>
            <h1 id="shareHeading">Import Transaction</h1>
          </div>
        </div>
        <div class="location-card">
          <p class="status-text">This page receives image shares after the app is installed.</p>
          <a class="primary-button share-link" href="./">Open Money Tracker</a>
        </div>
      </section>
    </main>
  </div>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
